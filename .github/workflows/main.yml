name: Daily Empty Commit

on:
  schedule:
    - cron: '30 18 * * *'   # runs at 00:00 IST daily (18:30 UTC)
  workflow_dispatch:        # allows manual trigger from Actions tab

permissions:
  contents: write

jobs:
  auto-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config --global user.name "Nishchal Goyal"
          git config --global user.email "goyalnishchal71@gmail.com"
      - name: Create empty commit
        run: |
          git commit --allow-empty -m "chore: daily commit $(date -u +'%Y-%m-%d')"
      - name: Push changes
        run: git push
